function comp(pd){if(!pd)return 0;const mF=Object.values(pd.matches||{}).filter(m=>m.h!==""&&m.a!=="").length;const sF=SPECIALS.filter(c=>(pd.specials||{})[c.key]&&pd.specials[c.key]!=="").length;return Math.round(((mF+sF)/(72+SPECIALS.length))*100);}
function calcPts(pd){if(!pd)return{total:0,det:{e:0,r:0,g:0}};const pts=S.config.points;let mP=0,sP=0,det={e:0,r:0,g:0};
Object.entries(GM).forEach(([g,ms])=>{ms.forEach((_,i)=>{const k=`${g}-${i}`,pr=pd.matches?.[k],re=S.results.matches?.[k];if(!pr||!re||pr.h===""||pr.a===""||re.h===""||re.a==="")return;const pH=+pr.h,pA=+pr.a,rH=+re.h,rA=+re.a;if(pH===rH&&pA===rA){mP+=(pts.exacto||0)+(pts.resultado||0)+(pts.goles_equipo||0)*2;det.e++;det.r++;det.g+=2;return;}if(Math.sign(pH-pA)===Math.sign(rH-rA)){mP+=pts.resultado||0;det.r++;}if(pH===rH){mP+=pts.goles_equipo||0;det.g++;}if(pA===rA){mP+=pts.goles_equipo||0;det.g++;}});});
const rSp=S.results.specials||{};SPECIALS.forEach(c=>{const pr=pd.specials?.[c.key],re=rSp[c.key];if(!pr||!re||pr===""||re==="")return;if(c.type==="number"){if(+pr===+re)sP+=pts[c.key]||0;}else{if(pr.toLowerCase().trim()===re.toLowerCase().trim())sP+=pts[c.key]||0;}});
return{total:mP+sP,det};}
function maxPM(){const p=S.config.points;return(p.resultado||0)+(p.goles_equipo||0)*2+(p.exacto||0);}

// в•җв•җв•җ HANDLERS в•җв•җв•җ
async function doLogin(){
  const name=document.getElementById("nameIn")?.value?.trim();if(!name)return;
  if(S.players[name]){
    const pin=prompt("Ya existe un jugador con ese nombre. IngresГЎ tu PIN de 4 dГӯgitos:");
    if(!pin)return;
    const hash=await sha256(pin);
    if(S.players[name].pin!==hash){toast("вқҢ PIN incorrecto");return;}
  }else{
    const pin=prompt("ElegГӯ un PIN de 4 dГӯgitos (para que nadie edite tu prode):");
    if(!pin||pin.length<3){toast("вқҢ PIN muy corto (mГӯnimo 3 dГӯgitos)");return;}
    const hash=await sha256(pin);
    const np=emptyP();np.pin=hash;
    S.players[name]=np;await dbSet("prode-players",S.players);
  }
  S.user={name,isAdmin:false};S.screen="play";render();
}
async function doAdminLogin(){
  const pass=document.getElementById("adminPassIn")?.value||"";
  const hash=await sha256(pass);
  if(hash===ADMIN_HASH){S.user={name:"Admin",isAdmin:true};S.screen="admin";S.showAdmin=false;await loadAll();render();}
  else toast("вқҢ ContraseГұa incorrecta");
}
async function setScore(k,side,v){if(isLocked(k))return;S.players[S.user.name].matches[k][side]=v;await dbSet("prode-players",S.players);render();}
async function setSpec(k,v){S.players[S.user.name].specials[k]=v;await dbSet("prode-players",S.players);render();}
async function setPt(k,v){S.config.points[k]=parseInt(v)||0;await dbSet("prode-config",S.config);render();}
async function setRes(k,s,v){if(!S.results.matches[k])S.results.matches[k]={h:"",a:""};S.results.matches[k][s]=v;await dbSet("prode-results",S.results);render();}
async function setRSp(k,v){if(!S.results.specials)S.results.specials={};S.results.specials[k]=v;await dbSet("prode-results",S.results);render();}
async function delPlayer(n){delete S.players[n];await dbSet("prode-players",S.players);toast("Borrado: "+n);}
async function doRefresh(){await loadAll();toast("рҹ”„ Actualizado");}
function go(s){S.screen=s;if(s==="ranking"||s==="admin")loadAll().then(render);else render();}

// в•җв•җв•җ RENDER в•җв•җв•җ
function render(){

  // Show others' predictions if locked

  o+=`</div>`;
});}

o+=`</div>`;return o;}

else o+=`<input class="inp" type="${cat.type==="number"?"number":"text"}" value="${val}" placeholder="Valor real..." style="border-color:rgba(245,158,11,.35);color:var(--gd)" onchange="setRSp('${cat.key}',this.value)">`;
o+=`</div>`;});}

if(S.adminTab==="players"){
o+=`<div class="cd" style="padding:10px"><div style="font-size:12px;color:var(--t2)">рҹ‘Ҙ Jugadores</div></div>`;
Object.entries(S.players).forEach(([name,data])=>{
o+=`<div class="cd" style="padding:12px"><div style="display:flex;align-items:center;justify-content:space-between"><div><div style="font-size:14px;font-weight:700">рҹ‘Ө ${name}</div><div style="font-size:12px;color:var(--t3)">${comp(data)}% completo</div></div><button style="background:rgba(239,68,68,.12);border:none;border-radius:8px;padding:6px 12px;color:var(--rd);font-size:12px;font-weight:700;cursor:pointer" onclick="if(confirm('ВҝBorrar a ${name}?'))delPlayer('${name}')">рҹ—‘пёҸ</button></div></div>`;});
if(!Object.keys(S.players).length)o+=`<div class="cd" style="text-align:center;color:var(--t3)">No hay jugadores</div>`;}

o+=`</div>`;return o;}

// в•җв•җв•җ INIT в•җв•җв•җ
(async()=>{await loadAll();render();})();
</script>
</body>
</html>
