const ALL_M=[];Object.entries(GM).forEach(([g,ms])=>ms.forEach((m,i)=>{ALL_M.push({k:`${g}-${i}`,l:`[${g}] ${m[0]} vs ${m[1]}`,g});}));

const SPECIALS=[
  {key:"campeon",label:"Campeón",icon:"🏆",type:"team"},{key:"subcampeon",label:"Subcampeón",icon:"🥈",type:"team"},
  {key:"tercero",label:"Tercer puesto",icon:"🥉",type:"team"},{key:"goleador",label:"Goleador",icon:"👟",type:"scorer"},
  {key:"goles_goleador",label:"Goles del goleador",icon:"🎯",type:"number"},
  {key:"mas_goleador",label:"País más goleador",icon:"💥",type:"team"},{key:"menos_recibe",label:"Mejor defensa (menos recibe)",icon:"🧱",type:"team"},
  {key:"mas_goleado",label:"País más goleado",icon:"😵",type:"team"},{key:"menos_goles",label:"Menos goles a favor",icon:"🔒",type:"team"},

  {key:"gol_torneo",label:"Total goles torneo",icon:"📊",type:"number"},

];
const DP={resultado:3,goles_equipo:1,exacto:5,ko_multi:1.5,campeon:20,subcampeon:12,tercero:8,goleador:15,goles_goleador:10,mas_goleador:8,menos_recibe:8,mas_goleado:8,menos_goles:8,ultimo:8,decepcion:6,sorpresa:6,mvp:12,mejor_arq:10,mejor_joven:10,gol_torneo:10,partido_mas_goles:5};

const SPECIALS_LOCK="2026-06-11T19:00Z";
function specialsLocked(){if(TEST_MODE)return true;return new Date()>=new Date(SPECIALS_LOCK);}
const AH="7d93823faecc8df64da2d16c6de6c8ee54fae1fec2278efcede48d7a0ed00c04";
async function sha256(t){const d=new TextEncoder().encode(t);const b=await crypto.subtle.digest("SHA-256",d);return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,"0")).join("");}
function emptyP(){const p={matches:{},specials:{},knockout:{}};Object.entries(GM).forEach(([g,ms])=>ms.forEach((_,i)=>{p.matches[`${g}-${i}`]={h:"",a:""};}));if(typeof emptyKoPreds==="function")p.knockout=emptyKoPreds();return p;}
function tOpts(s){return`<option value="">Elegí...</option>${TEAMS.map(t=>`<option value="${t}"${s===t?" selected":""}>${t}</option>`).join("")}`;}
function scOpts(s){return`<option value="">Elegí...</option>${SCORERS.map(x=>`<option value="${x}"${s===x?" selected":""}>${x}</option>`).join("")}`;}
function mOpts(s){return`<option value="">Elegí partido...</option>${ALL_M.map(m=>`<option value="${m.k}"${s===m.k?" selected":""}>${m.l}</option>`).join("")}`;}

let S={screen:"login",user:null,config:{points:{...DP}},players:{},results:{matches:{},specials:{},knockout:{}},playTab:"groups",ag:"A",adminTab:"points",adminGr:"A",toast:"",showAllPts:false,showAdmin:false,viewPlayer:null,koRound:"R32",adminKoRound:"R32",rankTab:"general"};
async function loadAll(){const[c,p,r]=await Promise.all([dbGet("prode-config"),dbGet("prode-players"),dbGet("prode-results")]);if(c)S.config=c;if(p)S.players=p;if(r)S.results=r;}
function toast(m){S.toast=m;render();setTimeout(()=>{S.toast="";render();},2e3);}
function comp(pd){if(!pd)return 0;const mF=Object.values(pd.matches||{}).filter(m=>m.h!==""&&m.a!=="").length;const sF=SPECIALS.filter(c=>(pd.specials||{})[c.key]&&pd.specials[c.key]!=="").length;return Math.round(((mF+sF)/(72+SPECIALS.length))*100);}
function calcPts(pd){if(!pd)return{total:0,det:{e:0,r:0,g:0}};const pts=S.config.points;let mP=0,sP=0,det={e:0,r:0,g:0};
Object.entries(GM).forEach(([g,ms])=>{ms.forEach((_,i)=>{const k=`${g}-${i}`,pr=pd.matches?.[k],re=S.results.matches?.[k];if(!pr||!re||pr.h===""||pr.a===""||re.h===""||re.a==="")return;const pH=+pr.h,pA=+pr.a,rH=+re.h,rA=+re.a;if(pH===rH&&pA===rA){mP+=(pts.exacto||0)+(pts.resultado||0)+(pts.goles_equipo||0)*2;det.e++;det.r++;det.g+=2;return;}if(Math.sign(pH-pA)===Math.sign(rH-rA)){mP+=pts.resultado||0;det.r++;}if(pH===rH){mP+=pts.goles_equipo||0;det.g++;}if(pA===rA){mP+=pts.goles_equipo||0;det.g++;}});});
const rSp=S.results.specials||{};SPECIALS.forEach(c=>{const pr=pd.specials?.[c.key],re=rSp[c.key];if(!pr||!re||pr===""||re==="")return;if(c.key==="gol_torneo"){const diff=Math.abs(+pr- +re);const base=pts[c.key]||0;if(diff===0)sP+=base;else if(diff<=5)sP+=Math.round(base*0.6);else if(diff<=10)sP+=Math.round(base*0.3);else if(diff<=20)sP+=Math.round(base*0.1);}else if(c.type==="number"){if(+pr===+re)sP+=pts[c.key]||0;}else{if(pr.toLowerCase().trim()===re.toLowerCase().trim())sP+=pts[c.key]||0;}});
return{total:mP+sP,det};}
// Add KO points
function calcTotalPts(pd){
  const gp=calcPts(pd);
  if(typeof calcKoPts==="function"){
    const kp=calcKoPts(pd.knockout,S.results.knockout,S.config.points);
    const multi=S.config.points.ko_multi||1;
    const koTotal=Math.round(kp.total*multi);
    return{total:gp.total+koTotal,det:{e:gp.det.e+kp.det.e,r:gp.det.r+kp.det.r,g:gp.det.g+kp.det.g}};
  }
  return gp;
}
function maxPM(){const p=S.config.points;return(p.resultado||0)+(p.goles_equipo||0)*2+(p.exacto||0);}

else{const pin=prompt("¡Hola "+name+"! Creá un PIN (mín 3 dígitos) para proteger tu prode:");if(!pin||pin.length<3){toast("❌ PIN muy corto (mín 3)");return;}const h=await sha256(pin);const np=emptyP();np.pin=h;S.players[name]=np;await dbSet("prode-players",S.players);}

// Group handlers
async function createGroup(){
  const name=document.getElementById("grpName")?.value?.trim();
  const code=(document.getElementById("grpCode")?.value||"").trim().toUpperCase();
  const prize=document.getElementById("grpPrize")?.value?.trim()||"";
  const prize_last=document.getElementById("grpPrizeLast")?.value?.trim()||"";
  if(!name||!code||code.length<3){toast("❌ Nombre y código (mín 3 letras) requeridos");return;}
  if(!S.config.groups)S.config.groups={};
  if(S.config.groups[code]){toast("❌ Ese código ya existe");return;}
  S.config.groups[code]={name,code,prize,prize_last};
  await dbSet("prode-config",S.config);toast("✅ Grupo "+code+" creado");render();
}
async function deleteGroup(code){
  if(!S.config.groups)return;delete S.config.groups[code];
  // Remove from all players
  Object.values(S.players).forEach(p=>{if(p.groups)p.groups=p.groups.filter(g=>g!==code);});
  await dbSet("prode-config",S.config);await dbSet("prode-players",S.players);toast("Grupo borrado");render();
}
async function joinGroup(){
  const code=(document.getElementById("joinCode")?.value||"").trim().toUpperCase();
  if(!code){toast("❌ Poné un código");return;}
  await loadAll();
  const groups=S.config.groups||{};
  if(!groups[code]){toast("❌ No existe ese grupo");return;}
  const p=S.players[S.user.name];if(!p)return;
  if(!Array.isArray(p.groups))p.groups=[];
  if(p.groups.includes(code)){toast("Ya estás en ese grupo");return;}
  p.groups.push(code);
  await dbSet("prode-players",S.players);toast("✅ Te uniste a "+groups[code].name);render();
}
async function leaveGroup(code){
  await loadAll();
  const p=S.players[S.user.name];if(!p)return;
  if(!Array.isArray(p.groups))return;
  p.groups=p.groups.filter(g=>g!==code);
  await dbSet("prode-players",S.players);toast("Saliste del grupo");render();
}
async function doRefresh(){await loadAll();toast("🔄 Actualizado");}
function go(s){S.screen=s;S.viewPlayer=null;if(s==="ranking"||s==="admin")loadAll().then(render);else render();}
function toggleTest(){TEST_MODE=!TEST_MODE;toast(TEST_MODE?"🧪 Modo test ON: todos los partidos bloqueados":"✅ Modo test OFF");render();}

function shareWA(){
  const ranks=Object.entries(S.players).map(([n,d])=>({n,p:calcPts(d)})).sort((a,b)=>b.p.total-a.p.total);
  let msg="⚽🏆 *Ranking Prode Mundial 2026*\n\n";
  const mds=["🥇","🥈","🥉"];
  ranks.forEach((r,i)=>{msg+=`${i<3?mds[i]:(i+1)+"."} ${r.n}: ${r.p.total} pts\n`;});
  msg+=`\n¡Jugá vos también! ${window.location.href}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,"_blank");
}

o+=`<div style="font-size:12px;padding:4px 0;color:var(--gl);font-weight:700;border-top:1px solid var(--bd);margin-top:4px">Máx: ${maxPM()}/partido · ${maxPM()*72} total</div>`;
o+=`<div style="font-size:12px;font-weight:800;color:var(--pl);margin-top:10px;margin-bottom:6px;border-bottom:1px solid var(--bd);padding-bottom:4px">🏅 Especiales</div>`;
SPECIALS.forEach(s=>{const v=pts[s.key]||0;sT+=v;o+=`<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0;color:var(--t2)"><span>${s.icon} ${s.label}</span><b style="color:var(--gd)">${v}</b></div>`;});
o+=`<div style="font-size:13px;padding:6px 0 0;color:var(--gl2);font-weight:800;border-top:1px solid var(--bd);margin-top:4px">🏆 Máximo: ${maxPM()*72+sT}</div></div>`;}
o+=`</div></div>`;return o;}

// ═══ ADMIN ═══
function rAdmin(){
const g=S.adminGr,pts=S.config.points;
let o=`<div style="padding:12px 16px 30px"><div style="display:flex;justify-content:space-between;gap:4px;margin-bottom:8px;flex-wrap:wrap"><button class="btn bgh" style="width:auto;padding:5px 10px;font-size:11px" onclick="doRefresh()">🔄</button><button class="btn ${TEST_MODE?"bg2":"bgh"}" style="width:auto;padding:5px 10px;font-size:11px" onclick="toggleTest()">${TEST_MODE?"🧪 Test ON":"🧪 Bloqueo"}</button><button class="btn bgh" style="width:auto;padding:5px 10px;font-size:11px" onclick="checkApi()">📡 API</button><button class="btn bgl" style="width:auto;padding:5px 10px;font-size:11px" onclick="runApiTest()">🧪 Cargar 2022</button><button class="btn bgh" style="width:auto;padding:5px 10px;font-size:11px;color:var(--rd)" onclick="if(confirm('¿Borrar todos los resultados?'))clearTest()">🗑️</button></div>`;
o+=`<div class="st">${[["points","🎯 Puntos"],["results","📝 Grupos"],["koresults","🏆 Elim."],["realspecials","🏅 Especiales"],["friendgroups","👥 Grupos"],["players","👤 Jugadores"]].map(([k,l])=>`<button class="stb ${S.adminTab===k?"a":""}" onclick="S.adminTab='${k}';render()" style="font-size:11px">${l}</button>`).join("")}</div>`;

if(S.adminTab==="points"){
o+=`<div class="cd"><div style="font-size:14px;font-weight:800;margin-bottom:10px">⚽ Por partido</div>`;
[{k:"resultado",l:"Resultado (V/E/D)"},{k:"goles_equipo",l:"Goles 1 equipo"},{k:"exacto",l:"Exacto"}].forEach(x=>{
o+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:13px;font-weight:700">${x.l}</span><div style="display:flex;align-items:center;gap:4px"><input type="number" min="0" value="${pts[x.k]}" onchange="setPt('${x.k}',this.value)" style="width:50px;height:32px;text-align:center;font-size:15px;font-weight:800;border-radius:8px;border:2px solid var(--bd);background:var(--bg);color:var(--gd);outline:none"><span style="font-size:11px;color:var(--t3)">pts</span></div></div>`;});
o+=`</div><div class="cd"><div style="font-size:14px;font-weight:800;margin-bottom:10px">🏆 Eliminatorias — Multiplicador</div>
<div style="font-size:12px;color:var(--t2);margin-bottom:8px">Los puntos de partidos de eliminatorias se multiplican por este valor. Ej: x1.5 = un exacto de grupos vale 5, en eliminatorias vale 7.5</div>
<div style="display:flex;gap:6px;align-items:center">${[1,1.5,2,3].map(v=>`<button class="btn ${(pts.ko_multi||1.5)===v?"bgl":"bgh"}" style="width:auto;padding:6px 14px;font-size:13px;font-weight:800" onclick="setPt('ko_multi',${v})">x${v}</button>`).join("")}</div>
</div><div class="cd"><div style="font-size:14px;font-weight:800;margin-bottom:10px">🏅 Especiales</div>`;
SPECIALS.forEach(s=>{o+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(37,37,80,.1)"><span style="font-size:12px">${s.icon} ${s.label}</span><div style="display:flex;align-items:center;gap:4px"><input type="number" min="0" value="${pts[s.key]||0}" onchange="setPt('${s.key}',this.value)" style="width:50px;height:28px;text-align:center;font-size:13px;font-weight:800;border-radius:8px;border:2px solid var(--bd);background:var(--bg);color:var(--gd);outline:none"></div></div>`;});
o+=`</div>`;}

if(S.adminTab==="results"){
o+=`<div class="cd" style="padding:10px"><div style="font-size:12px;color:var(--t2)">📝 Resultados reales. Se actualizan automáticamente cuando arranque el mundial, pero podés cargarlos a mano también.</div></div>`;
o+=`<div class="gg">${Object.keys(GROUPS).map(gr=>`<button class="gb ${gr===g?"ga":""}" onclick="S.adminGr='${gr}';render()">${gr}</button>`).join("")}</div>`;
GM[g].forEach((match,i)=>{const k=`${g}-${i}`,m=(S.results.matches||{})[k]||{h:"",a:""};
o+=`<div class="mr rl"><div class="tl r"><span class="n">${match[0]}</span>${flag(match[0])}</div><input class="sci gld" type="number" min="0" max="20" value="${m.h}" onchange="setRes('${k}','h',this.value)"><span style="color:var(--t3);font-weight:800;font-size:11px">vs</span><input class="sci gld" type="number" min="0" max="20" value="${m.a}" onchange="setRes('${k}','a',this.value)"><div class="tl">${flag(match[1])}<span class="n">${match[1]}</span></div></div>`;});}

if(S.adminTab==="koresults"){
o+=`<div class="cd" style="padding:10px"><div style="font-size:12px;color:var(--t2)">🏆 Resultados de eliminatorias. Los cruces se arman solos desde los grupos. En empates al 120', elegí quién ganó por penales.</div></div>`;
if(typeof renderKoAdmin==="function"){
  o+=renderKoAdmin(S,flag,setKoRes,setKoPen);
} else {
  o+=`<div class="cd" style="text-align:center;color:var(--t3)">Cargando...</div>`;
}}

if(S.adminTab==="realspecials"){
o+=`<div class="cd" style="padding:10px"><div style="font-size:12px;color:var(--t2)">🏅 Datos reales</div></div>`;
SPECIALS.forEach(cat=>{const val=(S.results.specials||{})[cat.key]||"";
o+=`<div class="cd" style="padding:12px;margin-bottom:8px"><div style="font-size:13px;font-weight:700;margin-bottom:6px">${cat.icon} ${cat.label}</div>`;
if(cat.type==="team")o+=`<select class="sel" style="border-color:rgba(245,158,11,.35);color:var(--gd)" onchange="setRSp('${cat.key}',this.value)"><option value="">...</option>${TEAMS.map(t=>`<option value="${t}"${val===t?" selected":""}>${t}</option>`).join("")}</select>`;
else if(cat.type==="match")o+=`<select class="sel" style="border-color:rgba(245,158,11,.35);color:var(--gd)" onchange="setRSp('${cat.key}',this.value)">${mOpts(val)}</select>`;
else o+=`<input class="inp" type="${cat.type==="number"?"number":"text"}" value="${val}" placeholder="..." style="border-color:rgba(245,158,11,.35);color:var(--gd)" onchange="setRSp('${cat.key}',this.value)">`;
o+=`</div>`;});}

if(S.adminTab==="friendgroups"){
if(typeof renderGroupsAdmin==="function"){
  o+=renderGroupsAdmin(S,createGroup,deleteGroup);
} else {
  o+=`<div class="cd" style="text-align:center;color:var(--t3)">Cargando...</div>`;
}}

if(S.adminTab==="players"){
o+=`<div class="cd" style="padding:10px"><div style="font-size:12px;color:var(--t2)">👥 Jugadores</div></div>`;
Object.entries(S.players).forEach(([name,data])=>{
o+=`<div class="cd" style="padding:12px"><div style="display:flex;align-items:center;justify-content:space-between"><div><div style="font-size:14px;font-weight:700">👤 ${name}</div><div style="font-size:12px;color:var(--t3)">${comp(data)}%</div></div><button style="background:rgba(239,68,68,.12);border:none;border-radius:8px;padding:6px 12px;color:var(--rd);font-size:12px;font-weight:700;cursor:pointer" onclick="if(confirm('¿Borrar a ${name}?'))delPlayer('${name}')">🗑️</button></div></div>`;});
if(!Object.keys(S.players).length)o+=`<div class="cd" style="text-align:center;color:var(--t3)">No hay jugadores</div>`;}
o+=`</div>`;return o;}

// ═══ INIT ═══
(async()=>{await loadAll();render();
// Try auto-fetch results every 5 min during tournament
setInterval(fetchAutoResults,5*60*1000);
})();
</script>
</body>
</html>
