<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#080814;--card:#111125;--card2:#1a1a34;--bdr:#252550;--pr:#7c3aed;--prL:#a78bfa;--gn:#10b981;--gnL:#34d399;--rd:#ef4444;--gd:#f59e0b;--tx:#eeeef8;--tx2:#9898b8;--tx3:#5a5a7a}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--tx);max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;overflow-x:hidden}
input,select,button,textarea{font-family:inherit}
button{cursor:pointer}
.hdr{background:linear-gradient(135deg,var(--pr) 0%,#dc2626 55%,var(--gd) 100%);padding:26px 16px 14px;text-align:center;border-radius:0 0 20px 20px;position:relative}
.hdr::before{content:'';position:absolute;inset:0;opacity:.07;background:repeating-linear-gradient(45deg,transparent,transparent 18px,#fff 18px,#fff 36px);border-radius:0 0 20px 20px}
.hdr *{position:relative}
.nav{display:flex;gap:4px;margin-top:12px;justify-content:center;flex-wrap:wrap}
.nbtn{padding:5px 12px;border-radius:14px;border:none;font-size:12px;font-weight:700;color:#fff;background:rgba(255,255,255,.1)}
.nbtn.a{background:rgba(255,255,255,.25)}
.cd{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--bdr);margin-bottom:10px}
.btn{padding:10px 16px;border-radius:10px;border:none;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;gap:6px;width:100%;transition:opacity .15s}
.btn:active{opacity:.8}
.bp{background:var(--pr);color:#fff}.bg{background:var(--gn);color:#fff}.bgl{background:var(--gd);color:#000}.bgh{background:var(--card2);color:var(--tx2);border:1px solid var(--bdr)}
.inp{padding:9px 12px;border-radius:9px;background:var(--card2);border:1px solid var(--bdr);color:var(--tx);font-size:14px;outline:none;width:100%;box-sizing:border-box}
.inp:focus{border-color:var(--pr)}
.sel{padding:8px 10px;border-radius:8px;background:var(--bg);border:1px solid var(--bdr);color:var(--tx);font-size:13px;outline:none;width:100%;box-sizing:border-box}
.sci{width:40px;height:36px;text-align:center;font-size:16px;font-weight:800;border:2px solid var(--bdr);border-radius:8px;background:var(--bg);color:var(--tx);outline:none}
.sci.gold{border-color:rgba(245,158,11,.35);color:var(--gd)}
.mrow{background:var(--card);border-radius:10px;padding:8px 10px;border:1px solid var(--bdr);display:flex;align-items:center;gap:6px;margin-bottom:6px}
.mrow.real{border-color:rgba(245,158,11,.2)}
.tl{flex:1;display:flex;align-items:center;gap:4px;min-width:0;font-size:12px;font-weight:600}
.tl.r{justify-content:flex-end;text-align:right}
.tl .n{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fl{font-size:16px;flex-shrink:0}
.gg{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:10px}
.gb{padding:7px 0;border-radius:8px;border:2px solid var(--bdr);background:transparent;color:var(--tx3);font-size:13px;font-weight:800}
.gb.act{border-color:var(--pr);background:rgba(124,58,237,.12);color:var(--prL)}
.gb.done{border-color:var(--gn);color:var(--gnL)}
.gb.gact{border-color:var(--gd);background:rgba(245,158,11,.12);color:var(--gd)}
.stabs{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto}
.stab{padding:7px 12px;border-radius:14px;border:none;font-size:12px;font-weight:700;white-space:nowrap;background:var(--card);color:var(--tx3)}
.stab.a{background:var(--pr);color:#fff}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--gn);color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;font-weight:700;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.4);animation:fu .3s ease}
@keyframes fu{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.pbar{flex:1;height:7px;background:var(--card2);border-radius:4px;overflow:hidden}
.pfill{height:100%;border-radius:4px;transition:width .4s}
</style>

<body>

<div id="app"></div>

<script>
// ═══════════════ SUPABASE CLIENT ═══════════════
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function dbGet(key) {
  try {
    const {data} = await sb.from("prode_storage").select("value").eq("key", key).single();
    return data ? JSON.parse(data.value) : null;
  } catch { return null; }
}

async function dbSet(key, value) {
  try {
    await sb.from("prode_storage").upsert({ key, value: JSON.stringify(value), updated_at: new Date().toISOString() });
  } catch(e) { console.error("dbSet error", e); }
}

// ═══════════════ DATA ═══════════════
const GROUPS={A:["México","Corea del Sur","Sudáfrica","Chequia"],B:["Canadá","Suiza","Qatar","Bosnia-Herz."],C:["Brasil","Marruecos","Escocia","Haití"],D:["EE.UU.","Paraguay","Australia","Turquía"],E:["Alemania","Ecuador","Costa de Marfil","Curazao"],F:["Japón","Países Bajos","Suecia","Túnez"],G:["Bélgica","Irán","Egipto","Nueva Zelanda"],H:["España","Uruguay","Arabia Saudita","Cabo Verde"],I:["Francia","Noruega","Senegal","Irak"],J:["Argentina","Austria","Argelia","Jordania"],K:["Portugal","Colombia","Uzbekistán","R.D. Congo"],L:["Inglaterra","Croacia","Ghana","Panamá"]};
const TEAMS=Object.values(GROUPS).flat();
const FL={"México":"🇲🇽","Corea del Sur":"🇰🇷","Sudáfrica":"🇿🇦","Chequia":"🇨🇿","Canadá":"🇨🇦","Suiza":"🇨🇭","Qatar":"🇶🇦","Bosnia-Herz.":"🇧🇦","Brasil":"🇧🇷","Marruecos":"🇲🇦","Escocia":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Haití":"🇭🇹","EE.UU.":"🇺🇸","Paraguay":"🇵🇾","Australia":"🇦🇺","Turquía":"🇹🇷","Alemania":"🇩🇪","Ecuador":"🇪🇨","Costa de Marfil":"🇨🇮","Curazao":"🇨🇼","Japón":"🇯🇵","Países Bajos":"🇳🇱","Suecia":"🇸🇪","Túnez":"🇹🇳","Bélgica":"🇧🇪","Irán":"🇮🇷","Egipto":"🇪🇬","Nueva Zelanda":"🇳🇿","España":"🇪🇸","Uruguay":"🇺🇾","Arabia Saudita":"🇸🇦","Cabo Verde":"🇨🇻","Francia":"🇫🇷","Noruega":"🇳🇴","Senegal":"🇸🇳","Irak":"🇮🇶","Argentina":"🇦🇷","Austria":"🇦🇹","Argelia":"🇩🇿","Jordania":"🇯🇴","Portugal":"🇵🇹","Colombia":"🇨🇴","Uzbekistán":"🇺🇿","R.D. Congo":"🇨🇩","Inglaterra":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Croacia":"🇭🇷","Ghana":"🇬🇭","Panamá":"🇵🇦"};
const GM={};Object.entries(GROUPS).forEach(([g,t])=>{GM[g]=[[t[0],t[2]],[t[1],t[3]],[t[0],t[1]],[t[2],t[3]],[t[0],t[3]],[t[1],t[2]]];});
const SCORERS=["Kylian Mbappé","Erling Haaland","Lionel Messi","Vinícius Jr.","Harry Kane","Lautaro Martínez","Julián Álvarez","Bukayo Saka","Cristiano Ronaldo","Viktor Gyökeres","Mohamed Salah","Darwin Núñez","Jamal Musiala","Phil Foden","Cody Gakpo","Florian Wirtz","Jude Bellingham","Lamine Yamal","Alejandro Garnacho","Fermín López","Dani Olmo","Pedri","Victor Osimhen","Serge Gnabry","Denzel Dumfries","Memphis Depay","Xavi Simons","Mehdi Taremi","Alexander Isak","Dejan Kulusevski","Ademola Lookman","Iñaki Williams","Marcus Rashford","Kevin De Bruyne","Jérémy Doku","Santiago Giménez","Luis Suárez","Luis Díaz","Rafael Leão","Randal Kolo Muani","Otro"];
const SPECIALS=[
  {key:"campeon",label:"Campeón",icon:"🏆",type:"team"},{key:"subcampeon",label:"Subcampeón",icon:"🥈",type:"team"},
  {key:"tercero",label:"Tercer puesto",icon:"🥉",type:"team"},{key:"goleador",label:"Goleador",icon:"👟",type:"scorer"},
  {key:"goles_goleador",label:"Goles del goleador",icon:"🎯",type:"number"},
  {key:"mas_goleado",label:"Más goleado",icon:"😵",type:"team"},{key:"menos_goles",label:"Menos goles a favor",icon:"🔒",type:"team"},
  {key:"ultimo",label:"Equipo último",icon:"💀",type:"team"},{key:"decepcion",label:"Decepción",icon:"😔",type:"team"},
  {key:"sorpresa",label:"Sorpresa",icon:"🤩",type:"team"},{key:"mvp",label:"MVP",icon:"🌟",type:"text"},
  {key:"mejor_arq",label:"Mejor arquero",icon:"🧤",type:"text"},{key:"mejor_joven",label:"Mejor joven",icon:"👶",type:"text"},
  {key:"gol_torneo",label:"Total goles torneo",icon:"📊",type:"number"},{key:"mejor_partido",label:"Mejor partido",icon:"🔥",type:"text"}
];
const DEF_PTS={resultado:3,goles_equipo:1,exacto:5,campeon:20,subcampeon:12,tercero:8,goleador:15,goles_goleador:10,mas_goleado:8,menos_goles:8,ultimo:8,decepcion:6,sorpresa:6,mvp:12,mejor_arq:10,mejor_joven:10,gol_torneo:10,mejor_partido:5};
// SHA-256 hash of admin password
const ADMIN_HASH="7d93823faecc8df64da2d16c6de6c8ee54fae1fec2278efcede48d7a0ed00c04";

async function sha256(t){const d=new TextEncoder().encode(t);const b=await crypto.subtle.digest("SHA-256",d);return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,"0")).join("");}

function emptyPlayer(){const p={matches:{},specials:{}};Object.entries(GM).forEach(([g,ms])=>ms.forEach((_,i)=>{p.matches[`${g}-${i}`]={h:"",a:""};}));return p;}

function teamOpts(sel){return`<option value="">Elegí selección...</option>${TEAMS.map(t=>`<option value="${t}"${sel===t?" selected":""}>${FL[t]||""} ${t}</option>`).join("")}`;}
function scorerOpts(sel){return`<option value="">Elegí goleador...</option>${SCORERS.map(s=>`<option value="${s}"${sel===s?" selected":""}>${s}</option>`).join("")}`;}

// ═══════════════ STATE ═══════════════
let S = {
  screen:"login", user:null, config:{points:{...DEF_PTS}},
  players:{}, results:{matches:{},specials:{}},
  playTab:"groups", ag:"A", adminTab:"points", adminGr:"A",
  loginName:"", adminPass:"", showAdmin:false, toast:"", showAllPts:false
};

async function loadAll(){
  const [c,p,r]=await Promise.all([dbGet("prode-config"),dbGet("prode-players"),dbGet("prode-results")]);
  if(c)S.config=c; if(p)S.players=p; if(r)S.results=r;
}

function toast(m){S.toast=m;render();setTimeout(()=>{S.toast="";render();},2000);}

function completion(pd){
  if(!pd)return 0;
  const mF=Object.values(pd.matches||{}).filter(m=>m.h!==""&&m.a!=="").length;
  const sF=SPECIALS.filter(c=>(pd.specials||{})[c.key]&&pd.specials[c.key]!=="").length;
  return Math.round(((mF+sF)/(72+SPECIALS.length))*100);
}

function calcPts(pd){
  if(!pd)return{total:0,det:{exactos:0,resultados:0,goles:0}};
  const pts=S.config.points;let mP=0,sP=0,det={exactos:0,resultados:0,goles:0};
  Object.entries(GM).forEach(([g,ms])=>{ms.forEach((_,i)=>{
    const k=`${g}-${i}`,pred=pd.matches?.[k],real=S.results.matches?.[k];
    if(!pred||!real||pred.h===""||pred.a===""||real.h===""||real.a==="")return;
    const pH=+pred.h,pA=+pred.a,rH=+real.h,rA=+real.a;
    if(pH===rH&&pA===rA){mP+=(pts.exacto||0)+(pts.resultado||0)+(pts.goles_equipo||0)*2;det.exactos++;det.resultados++;det.goles+=2;return;}
    if(Math.sign(pH-pA)===Math.sign(rH-rA)){mP+=pts.resultado||0;det.resultados++;}
    if(pH===rH){mP+=pts.goles_equipo||0;det.goles++;}
    if(pA===rA){mP+=pts.goles_equipo||0;det.goles++;}
  });});
  const rSp=S.results.specials||{};
  SPECIALS.forEach(c=>{const pr=pd.specials?.[c.key],re=rSp[c.key];
    if(!pr||!re||pr===""||re==="")return;
    if(c.type==="number"){if(+pr===+re)sP+=pts[c.key]||0;}
    else{if(pr.toLowerCase().trim()===re.toLowerCase().trim())sP+=pts[c.key]||0;}
  });
  return{total:mP+sP,det};
}

function maxPM(){const p=S.config.points;return(p.resultado||0)+(p.goles_equipo||0)*2+(p.exacto||0);}

// ═══════════════ HANDLERS ═══════════════
async function doLogin(){
  const name=S.loginName.trim();if(!name)return;
  if(!S.players[name]){S.players[name]=emptyPlayer();await dbSet("prode-players",S.players);}
  S.user={name,isAdmin:false};S.screen="play";S.loginName="";render();
}

async function doAdminLogin(){
  const hash=await sha256(S.adminPass);
  if(hash===ADMIN_HASH){S.user={name:"Admin",isAdmin:true};S.screen="admin";S.adminPass="";S.showAdmin=false;await loadAll();render();}
  else{toast("❌ Contraseña incorrecta");}
}

async function setScore(k,side,v){
  S.players[S.user.name].matches[k][side]=v;
  await dbSet("prode-players",S.players);render();
}

async function setSpec(k,v){
  S.players[S.user.name].specials[k]=v;
  await dbSet("prode-players",S.players);render();
}

async function setPt(k,v){
  S.config.points[k]=parseInt(v)||0;
  await dbSet("prode-config",S.config);render();
}

async function setRes(k,side,v){
  if(!S.results.matches[k])S.results.matches[k]={h:"",a:""};
  S.results.matches[k][side]=v;
  await dbSet("prode-results",S.results);render();
}

async function setRSp(k,v){
  if(!S.results.specials)S.results.specials={};
  S.results.specials[k]=v;
  await dbSet("prode-results",S.results);render();
}

async function delPlayer(name){
  delete S.players[name];
  await dbSet("prode-players",S.players);toast(`Borrado: ${name}`);
}

async function doRefresh(){await loadAll();toast("🔄 Actualizado");render();}

function go(scr){S.screen=scr;if(scr==="ranking"||scr==="admin")loadAll().then(render);else render();}

// ═══════════════ RENDER ═══════════════
function render(){
  const app=document.getElementById("app");
  const pc=Object.keys(S.players).length;
  const u=S.user;

  // Header
  let navH="";
  if(u){
    const tabs=u.isAdmin?[["admin","⚙️ Admin"],["ranking","🏆 Ranking"]]:[["play","✏️ Mi Prode"],["ranking","🏆 Ranking"]];
    navH=`<div class="nav">${tabs.map(([k,l])=>`<button class="nbtn ${S.screen===k?"a":""}" onclick="go('${k}')">${l}</button>`).join("")}<button class="nbtn" onclick="S.user=null;S.screen='login';S.showAdmin=false;render()">🚪 Salir</button></div>`;
  }

  const header=`<div class="hdr"><div style="font-size:11px;letter-spacing:5px;text-transform:uppercase;opacity:.8">Súper Prode</div><div style="font-size:26px;font-weight:900;text-shadow:0 2px 10px rgba(0,0,0,.4)">MUNDIAL 2026 ⚽</div><div style="font-size:11px;opacity:.7;margin-top:1px">USA · México · Canadá — ${pc} jugador${pc!==1?"es":""}</div>${navH}</div>`;

  const toastH=S.toast?`<div class="toast">${S.toast}</div>`:"";

  if(!u){app.innerHTML=header+renderLogin(pc)+toastH;return;}
  if(S.screen==="play")app.innerHTML=header+renderPlay()+toastH;
  else if(S.screen==="ranking")app.innerHTML=header+renderRanking()+toastH;
  else if(S.screen==="admin")app.innerHTML=header+renderAdmin()+toastH;
}

// ═══════════════ LOGIN ═══════════════
function renderLogin(pc){
  const list=pc>0?`<div class="cd" style="margin-top:6px"><div style="font-size:13px;font-weight:700;color:var(--tx2);margin-bottom:8px">Jugadores registrados:</div><div style="display:flex;flex-wrap:wrap;gap:6px">${Object.keys(S.players).map(n=>`<span style="font-size:12px;background:var(--card2);border-radius:8px;padding:4px 10px;color:var(--tx2)">👤 ${n} <span style="color:var(--prL)">(${completion(S.players[n])}%)</span></span>`).join("")}</div></div>`:"";

  const adm=S.showAdmin?`<div style="font-size:14px;font-weight:700;margin-bottom:8px">🔐 Acceso Admin</div><input class="inp" type="password" id="adminPassIn" placeholder="Contraseña..." style="margin-bottom:8px" onkeydown="if(event.key==='Enter'){S.adminPass=this.value;doAdminLogin();}"><button class="btn bgl" onclick="S.adminPass=document.getElementById('adminPassIn').value;doAdminLogin();">Entrar como Admin</button>`:`<button style="background:none;border:none;color:var(--tx3);font-size:13px;cursor:pointer;padding:4px;font-weight:600" onclick="S.showAdmin=true;render()">🔐 Soy el administrador...</button>`;

  return`<div style="padding:16px">
    <div class="cd"><div style="font-size:18px;font-weight:800;margin-bottom:6px">👋 ¡Bienvenido al Prode!</div>
    <div style="font-size:13px;color:var(--tx2);line-height:1.6;margin-bottom:16px">Escribí tu nombre para cargar tus predicciones. Si ya jugaste, usá el mismo nombre.</div>
    <input class="inp" id="nameIn" placeholder="Tu nombre..." style="margin-bottom:10px" onkeydown="if(event.key==='Enter'){S.loginName=this.value;doLogin();}">
    <button class="btn bp" onclick="S.loginName=document.getElementById('nameIn').value;doLogin();">✏️ Entrar a jugar</button></div>
    <div class="cd" style="margin-top:6px">${adm}</div>
    ${list}
  </div>`;
}

// ═══════════════ PLAY ═══════════════
function renderPlay(){
  const pd=S.players[S.user.name]||emptyPlayer();
  const pct=completion(pd);
  const g=S.ag;
  const groupDone=gr=>GM[gr].every((_,i)=>{const m=pd.matches[`${gr}-${i}`];return m&&m.h!==""&&m.a!=="";});

  // Progress
  let out=`<div style="padding:12px 16px"><div class="cd" style="margin-bottom:0"><div style="display:flex;align-items:center;gap:10px"><div style="font-size:18px">👤</div><div style="flex:1"><div style="font-size:15px;font-weight:800">${S.user.name}</div><div style="display:flex;align-items:center;gap:8px;margin-top:4px"><div class="pbar"><div class="pfill" style="width:${pct}%;background:${pct===100?"var(--gn)":"linear-gradient(90deg,var(--pr),var(--prL))"}"></div></div><span style="font-size:13px;font-weight:800;color:${pct===100?"var(--gnL)":"var(--prL)"}">${pct}%</span></div></div></div>${pct===100?`<div style="margin-top:8px;padding:6px 10px;background:rgba(16,185,129,.08);border-radius:8px;font-size:12px;color:var(--gnL);font-weight:700;text-align:center">🎉 ¡Completaste todo!</div>`:""}</div></div>`;

  // Tabs
  out+=`<div style="display:flex;gap:4px;padding:0 16px 10px">${[["groups","⚽ Grupos"],["specials","🏅 Especiales"]].map(([k,l])=>`<button class="stab ${S.playTab===k?"a":""}" onclick="S.playTab='${k}';render()">${l}</button>`).join("")}</div>`;

  out+=`<div style="padding:0 16px">`;

  if(S.playTab==="groups"){
    // Group buttons
    out+=`<div class="gg">${Object.keys(GROUPS).map(gr=>{const d=groupDone(gr);return`<button class="gb ${gr===g?"act":d?"done":""}" onclick="S.ag='${gr}';render()">${gr}${d?"✓":""}</button>`;}).join("")}</div>`;

    // Teams
    out+=`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;background:var(--card);border-radius:10px;padding:8px">${GROUPS[g].map(t=>`<span style="font-size:12px;background:var(--card2);border-radius:6px;padding:3px 8px">${FL[t]} ${t}</span>`).join("")}</div>`;

    // Matches
    GM[g].forEach((match,i)=>{
      const k=`${g}-${i}`,m=pd.matches[k]||{h:"",a:""};
      out+=`<div class="mrow"><div class="tl r"><span class="n">${match[0]}</span><span class="fl">${FL[match[0]]}</span></div><input class="sci" type="number" min="0" max="20" value="${m.h}" onchange="setScore('${k}','h',this.value)"><span style="color:var(--tx3);font-weight:800;font-size:12px">vs</span><input class="sci" type="number" min="0" max="20" value="${m.a}" onchange="setScore('${k}','a',this.value)"><div class="tl"><span class="fl">${FL[match[1]]}</span><span class="n">${match[1]}</span></div></div>`;
    });

    // Nav
    out+=`<div style="display:flex;gap:6px;margin-top:10px">`;
    if(g!=="A")out+=`<button class="btn bgh" style="flex:1;font-size:13px" onclick="S.ag='${String.fromCharCode(g.charCodeAt(0)-1)}';render()">← Grupo ${String.fromCharCode(g.charCodeAt(0)-1)}</button>`;
    if(g!=="L")out+=`<button class="btn bp" style="flex:1;font-size:13px" onclick="S.ag='${String.fromCharCode(g.charCodeAt(0)+1)}';render()">Grupo ${String.fromCharCode(g.charCodeAt(0)+1)} →</button>`;
    out+=`</div>`;
  }

  if(S.playTab==="specials"){
    out+=`<div class="cd" style="padding:10px"><div style="font-size:12px;color:var(--tx2)">💡 Dan muchos puntos. ¡No te las saltees!</div></div>`;
    SPECIALS.forEach(cat=>{
      const val=pd.specials[cat.key]||"";
      const isCustom=cat.type==="scorer"&&val.startsWith("Otro:");
      const selectVal=isCustom?"Otro":val;
      const customName=isCustom?val.replace("Otro:","").trim():"";

      out+=`<div class="cd" style="padding:12px;margin-bottom:8px"><div style="font-size:13px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px"><span>${cat.icon}</span> ${cat.label}<span style="margin-left:auto;font-size:11px;color:var(--gd);font-weight:800">+${S.config.points[cat.key]||0}</span></div>`;

      if(cat.type==="team") out+=`<select class="sel" onchange="setSpec('${cat.key}',this.value)">${teamOpts(val)}</select>`;
      else if(cat.type==="scorer"){
        out+=`<select class="sel" onchange="if(this.value==='Otro'){setSpec('${cat.key}','Otro:');}else{setSpec('${cat.key}',this.value);}">${scorerOpts(selectVal)}</select>`;
        if(selectVal==="Otro") out+=`<input class="inp" style="margin-top:8px" value="${customName}" placeholder="Escribí el nombre del jugador..." onchange="setSpec('${cat.key}','Otro: '+this.value)">`;
      }
      else if(cat.type==="number") out+=`<input class="inp" type="number" min="0" value="${val}" placeholder="${cat.key==="gol_torneo"?"Ej: 172":"Ej: 8"}" onchange="setSpec('${cat.key}',this.value)">`;
      else out+=`<input class="inp" value="${val}" placeholder="Tu predicción..." onchange="setSpec('${cat.key}',this.value)">`;

      out+=`</div>`;
    });
  }

  out+=`</div>`;
  return out;
}

// ═══════════════ RANKING ═══════════════
function renderRanking(){
  const hasR=Object.keys(S.results.matches||{}).some(k=>{const m=S.results.matches[k];return m&&m.h!==""&&m.a!=="";});
  const medals=["🥇","🥈","🥉"];
  const ranks=Object.entries(S.players).map(([n,d])=>({n,d,p:calcPts(d),c:completion(d)})).sort((a,b)=>b.p.total-a.p.total);
  const pts=S.config.points;

  let out=`<div style="padding:16px">`;
  out+=`<div style="display:flex;justify-content:flex-end;margin-bottom:8px"><button class="btn bgh" style="width:auto;padding:5px 12px;font-size:12px" onclick="doRefresh()">🔄 Actualizar</button></div>`;

  if(!hasR) out+=`<div class="cd" style="text-align:center"><div style="font-size:40px;margin-bottom:8px">⏳</div><div style="font-size:15px;font-weight:700;margin-bottom:4px">Sin resultados aún</div><div style="font-size:13px;color:var(--tx2)">Cuando el admin cargue resultados, el ranking se calcula solo.</div></div>`;

  if(!ranks.length) out+=`<div class="cd" style="text-align:center"><div style="font-size:40px;margin-bottom:8px">👥</div><div style="font-size:15px;font-weight:700">No hay jugadores</div></div>`;
  else{
    out+=`<div style="font-size:14px;font-weight:800;color:var(--tx2);margin-bottom:8px">${ranks.length} jugador${ranks.length!==1?"es":""}</div>`;
    ranks.forEach((r,pos)=>{
      const isMe=S.user&&r.n===S.user.name;
      const bg=pos===0&&hasR?`background:linear-gradient(135deg,rgba(245,158,11,.07),var(--card));border-color:rgba(245,158,11,.27)`:"";
      const posC=pos<3&&hasR?["background:var(--gd);color:#000","background:#aaa;color:#000","background:#cd7f32;color:#000"][pos]:"background:var(--card2);color:var(--tx3)";
      const label=pos<3&&hasR?medals[pos]:pos+1;
      out+=`<div class="cd" style="padding:14px;margin-bottom:8px;${bg}"><div style="display:flex;align-items:center;gap:10px"><div style="width:34px;height:34px;border-radius:17px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:${pos<3&&hasR?17:14}px;font-weight:900;${posC}">${label}</div><div style="flex:1;min-width:0"><div style="font-size:15px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.n}${isMe?' <span style="font-size:11px;color:var(--prL)">(vos)</span>':""}</div><div style="font-size:11px;color:var(--tx3)">${r.c}% · ${r.p.det.exactos}🎯 ${r.p.det.resultados}✓ ${r.p.det.goles}⚽</div></div><div style="text-align:right"><div style="font-size:24px;font-weight:900;color:${hasR?"var(--gd)":"var(--tx3)"}">${r.p.total}</div><div style="font-size:10px;color:var(--tx3)">pts</div></div></div></div>`;
    });
  }

  // Full points table (expandable)
  out+=`<div class="cd" style="margin-top:4px"><button style="background:none;border:none;color:var(--tx);font-size:13px;font-weight:800;cursor:pointer;padding:0;display:flex;align-items:center;gap:6px;width:100%" onclick="S.showAllPts=!S.showAllPts;render()">📋 Sistema de puntos completo <span style="margin-left:auto;font-size:18px;color:var(--tx3)">${S.showAllPts?"▲":"▼"}</span></button>`;

  if(S.showAllPts){
    out+=`<div style="margin-top:12px">`;
    out+=`<div style="font-size:12px;font-weight:800;color:var(--prL);margin-bottom:6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">⚽ Por cada partido (72 partidos)</div>`;
    [{l:"Resultado correcto (V/E/D)",v:pts.resultado},{l:"Goles de 1 equipo",v:pts.goles_equipo},{l:"Resultado exacto (bonus)",v:pts.exacto}].forEach(r=>{
      out+=`<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:var(--tx2)"><span>${r.l}</span><b style="color:var(--gd)">${r.v} pts</b></div>`;
    });
    out+=`<div style="font-size:12px;padding:4px 0;color:var(--gnL);font-weight:700;border-top:1px solid var(--bdr);margin-top:4px">Máximo por partido: ${maxPM()} pts · Máx total: ${maxPM()*72} pts</div>`;
    out+=`<div style="font-size:12px;font-weight:800;color:var(--prL);margin-top:12px;margin-bottom:6px;border-bottom:1px solid var(--bdr);padding-bottom:4px">🏅 Predicciones especiales</div>`;
    let specTotal=0;
    SPECIALS.forEach(s=>{const v=pts[s.key]||0;specTotal+=v;
      out+=`<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:var(--tx2)"><span>${s.icon} ${s.label}</span><b style="color:var(--gd)">${v} pts</b></div>`;
    });
    out+=`<div style="font-size:12px;padding:4px 0;color:var(--gnL);font-weight:700;border-top:1px solid var(--bdr);margin-top:4px">Total especiales: ${specTotal} pts</div>`;
    out+=`<div style="font-size:13px;padding:8px 0 0;color:var(--gdL);font-weight:800;border-top:1px solid var(--bdr);margin-top:6px">🏆 Máximo teórico: ${maxPM()*72+specTotal} pts</div>`;
    out+=`</div>`;
  }
  out+=`</div>`;

  out+=`</div>`;
  return out;
}

// ═══════════════ ADMIN ═══════════════
function renderAdmin(){
  const g=S.adminGr;const pts=S.config.points;

  let out=`<div style="padding:12px 16px 30px">`;
  out+=`<div style="display:flex;justify-content:flex-end;margin-bottom:8px"><button class="btn bgh" style="width:auto;padding:5px 12px;font-size:12px" onclick="doRefresh()">🔄 Refrescar</button></div>`;

  out+=`<div class="stabs">${[["points","🎯 Puntos"],["results","📝 Resultados"],["realspecials","🏅 Especiales"],["players","👥 Jugadores"]].map(([k,l])=>`<button class="stab ${S.adminTab===k?"a":""}" onclick="S.adminTab='${k}';render()">${l}</button>`).join("")}</div>`;

  // POINTS
  if(S.adminTab==="points"){
    out+=`<div class="cd"><div style="font-size:14px;font-weight:800;margin-bottom:10px">⚽ Por partido</div>`;
    [{k:"resultado",l:"Resultado (V/E/D)",d:"Acertar quién gana o empate"},{k:"goles_equipo",l:"Goles de 1 equipo",d:"Acertar goles de un equipo"},{k:"exacto",l:"Resultado exacto",d:"Clavar el marcador"}].forEach(x=>{
      out+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div><div style="font-size:13px;font-weight:700">${x.l}</div><div style="font-size:11px;color:var(--tx3)">${x.d}</div></div><div style="display:flex;align-items:center;gap:4px"><input type="number" min="0" value="${pts[x.k]}" onchange="setPt('${x.k}',this.value)" style="width:50px;height:32px;text-align:center;font-size:15px;font-weight:800;border-radius:8px;border:2px solid var(--bdr);background:var(--bg);color:var(--gd);outline:none"><span style="font-size:11px;color:var(--tx3)">pts</span></div></div>`;
    });
    out+=`<div style="background:var(--card2);border-radius:8px;padding:10px;font-size:12px;color:var(--tx2);line-height:1.6">📌 Máximo por partido: <b style="color:var(--gnL)">${maxPM()} pts</b></div></div>`;

    out+=`<div class="cd"><div style="font-size:14px;font-weight:800;margin-bottom:10px">🏅 Especiales</div>`;
    SPECIALS.forEach(s=>{
      out+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(37,37,80,.1)"><span style="font-size:13px">${s.icon} ${s.label}</span><div style="display:flex;align-items:center;gap:4px"><input type="number" min="0" value="${pts[s.key]||0}" onchange="setPt('${s.key}',this.value)" style="width:50px;height:30px;text-align:center;font-size:14px;font-weight:800;border-radius:8px;border:2px solid var(--bdr);background:var(--bg);color:var(--gd);outline:none"><span style="font-size:11px;color:var(--tx3)">pts</span></div></div>`;
    });
    out+=`</div>`;
  }

  // RESULTS
  if(S.adminTab==="results"){
    out+=`<div class="cd" style="padding:10px;margin-bottom:10px"><div style="font-size:12px;color:var(--tx2)">📝 Cargá resultados reales.</div></div>`;
    out+=`<div class="gg">${Object.keys(GROUPS).map(gr=>`<button class="gb ${gr===g?"gact":""}" onclick="S.adminGr='${gr}';render()">${gr}</button>`).join("")}</div>`;
    GM[g].forEach((match,i)=>{
      const k=`${g}-${i}`,m=(S.results.matches||{})[k]||{h:"",a:""};
      out+=`<div class="mrow real"><div class="tl r"><span class="n">${match[0]}</span><span class="fl">${FL[match[0]]}</span></div><input class="sci gold" type="number" min="0" max="20" value="${m.h}" onchange="setRes('${k}','h',this.value)"><span style="color:var(--tx3);font-weight:800;font-size:12px">vs</span><input class="sci gold" type="number" min="0" max="20" value="${m.a}" onchange="setRes('${k}','a',this.value)"><div class="tl"><span class="fl">${FL[match[1]]}</span><span class="n">${match[1]}</span></div></div>`;
    });
  }

  // REAL SPECIALS
  if(S.adminTab==="realspecials"){
    out+=`<div class="cd" style="padding:10px"><div style="font-size:12px;color:var(--tx2)">🏅 Cargá datos reales del mundial.</div></div>`;
    SPECIALS.forEach(cat=>{
      const val=(S.results.specials||{})[cat.key]||"";
      out+=`<div class="cd" style="padding:12px;margin-bottom:8px"><div style="font-size:13px;font-weight:700;margin-bottom:6px">${cat.icon} ${cat.label}</div>`;
      if(cat.type==="team") out+=`<select class="sel" style="border-color:rgba(245,158,11,.35);color:var(--gd)" onchange="setRSp('${cat.key}',this.value)"><option value="">Sin cargar...</option>${TEAMS.map(t=>`<option value="${t}"${val===t?" selected":""}>${FL[t]} ${t}</option>`).join("")}</select>`;
      else out+=`<input class="inp" type="${cat.type==="number"?"number":"text"}" value="${val}" placeholder="Valor real..." style="border-color:rgba(245,158,11,.35);color:var(--gd)" onchange="setRSp('${cat.key}',this.value)">`;
      out+=`</div>`;
    });
  }

  // PLAYERS
  if(S.adminTab==="players"){
    out+=`<div class="cd" style="padding:10px"><div style="font-size:12px;color:var(--tx2)">👥 Jugadores registrados.</div></div>`;
    Object.entries(S.players).forEach(([name,data])=>{
      const pct=completion(data);
      out+=`<div class="cd" style="padding:12px;margin-bottom:8px"><div style="display:flex;align-items:center;justify-content:space-between"><div><div style="font-size:14px;font-weight:700">👤 ${name}</div><div style="font-size:12px;color:var(--tx3)">Completado: ${pct}%</div></div><button style="background:rgba(239,68,68,.12);border:none;border-radius:8px;padding:6px 12px;color:var(--rd);font-size:12px;font-weight:700;cursor:pointer" onclick="if(confirm('¿Borrar a ${name}?'))delPlayer('${name}')">🗑️</button></div></div>`;
    });
    if(!Object.keys(S.players).length) out+=`<div class="cd" style="text-align:center;color:var(--tx3)">No hay jugadores aún</div>`;
  }

  out+=`</div>`;
  return out;
}

// ═══════════════ INIT ═══════════════
(async()=>{
  await loadAll();
  render();
})();
</script>
</body>
</html>
